- id: air-blackbox-comply
  name: AIR Blackbox EU AI Act Compliance
  description: Scan Python files for EU AI Act compliance issues
  entry: air-blackbox-comply-strict
  language: python
  types: [python]
  additional_dependencies: ['air-blackbox']

- id: air-blackbox-comply-strict
  name: AIR Blackbox Strict Compliance
  description: Scan Python files for EU AI Act compliance (fails on warnings)
  entry: air-blackbox-comply-strict
  args: ['--strict']
  language: python
  types: [python]
  additional_dependencies: ['air-blackbox']

- id: air-blackbox-comply-gdpr
  name: AIR Blackbox EU AI Act + GDPR Compliance
  description: Scan Python files for EU AI Act and GDPR compliance
  entry: air-blackbox-comply-strict
  args: ['--gdpr']
  language: python
  types: [python]
  additional_dependencies: ['air-blackbox']

- id: air-blackbox-comply-full
  name: AIR Blackbox Full Compliance (EU AI Act + GDPR + Bias)
  description: Full compliance scan including bias and fairness checks
  entry: air-blackbox-comply-strict
  args: ['--gdpr', '--bias', '--strict']
  language: python
  types: [python]
  additional_dependencies: ['air-blackbox']
