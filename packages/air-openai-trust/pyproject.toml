[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "air-openai-trust"
version = "0.1.0"
description = "AIR Trust Layer for OpenAI Python SDK — audit trails, PII detection, injection scanning, and HMAC-SHA256 compliance chains for EU AI Act"
readme = "README.md"
license = {text = "Apache-2.0"}
requires-python = ">=3.10"
authors = [{name = "Jason Shotwell", email = "jason.j.shotwell@gmail.com"}]
keywords = [
    "openai", "eu-ai-act", "compliance", "audit-trail", "ai-safety",
    "guardrails", "pii-detection", "prompt-injection", "ai-governance",
    "hmac-sha256", "trust-layer",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Security",
    "Topic :: Software Development :: Quality Assurance",
]
dependencies = [
    "openai>=1.0",
]

[project.optional-dependencies]
full = ["air-blackbox>=1.7.0"]

[project.urls]
Homepage = "https://airblackbox.ai"
Documentation = "https://airblackbox.ai/quickstart"
Repository = "https://github.com/airblackbox/air-openai-trust"
Issues = "https://github.com/airblackbox/air-openai-trust/issues"
