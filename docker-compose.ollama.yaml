services:
  gateway:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - LISTEN_ADDR=:8080
      - PROVIDER_URL=http://host.docker.internal:11434
      - VAULT_ENDPOINT=minio:9000
      - VAULT_ACCESS_KEY=minioadmin
      - VAULT_SECRET_KEY=minioadmin
      - VAULT_BUCKET=air-runs
      - VAULT_USE_SSL=false
      - OTEL_EXPORTER_OTLP_ENDPOINT=collector:4317
      - RUNS_DIR=/data/runs
      - GUARDRAILS_CONFIG=/etc/gateway/guardrails.yaml
    volumes:
      - ./runs:/data/runs
      - ./guardrails.yaml:/etc/gateway/guardrails.yaml:ro
    depends_on:
      - minio
      - collector

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio-data:/data

  collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    command: ["--config=/etc/otel/collector.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./collector/collector-test.yaml:/etc/otel/collector.yaml:ro

  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports:
      - "16686:16686"
      - "14250:14250"
    environment:
      - COLLECTOR_OTLP_ENABLED=true

volumes:
  minio-data:
