##
## Air-Gapped Collector Config — Enterprise Tier
##
## Single pipeline: all traces stay local. No crowd pipeline, no external exports.
## Designed for deployment inside client VPS / on-prem where zero data leaves.
##

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 512

  # Tag all traces as air-gapped for internal audit trail
  attributes/tag:
    actions:
      - key: air.telemetry_mode
        action: upsert
        value: "air_gapped"
      - key: air.deployment
        action: upsert
        value: "enterprise_vps"

exporters:
  # Local only: Jaeger for the client's internal observability
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  # Debug output for troubleshooting (disable in production by removing from pipeline)
  debug:
    verbosity: basic

service:
  telemetry:
    logs:
      level: info

  pipelines:
    ## Single local pipeline — traces never leave this machine.
    traces:
      receivers: [otlp]
      processors: [attributes/tag, batch]
      exporters: [otlp/jaeger, debug]
